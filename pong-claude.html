<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pong WebRTC</title>
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;touch-action:none;font-family:monospace;color:#fff;}
  canvas{display:block;}
  #ui{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,0.96);overflow-y:auto;padding:20px;box-sizing:border-box;}
  h1{margin:0;font-size:clamp(20px,5vw,32px);letter-spacing:4px;}
  .hint{margin:0;font-size:13px;opacity:0.65;text-align:center;max-width:300px;line-height:1.5;}
  button{background:#fff;color:#000;border:none;padding:12px 28px;font-family:monospace;font-size:15px;cursor:pointer;letter-spacing:2px;}
  button:active{background:#aaa;}
  button.sec{background:#333;color:#fff;font-size:13px;padding:10px 20px;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .status{font-size:12px;opacity:0.75;text-align:center;min-height:18px;}
  textarea{background:#111;color:#0f0;border:1px solid #444;font-family:monospace;font-size:11px;width:280px;height:80px;resize:none;padding:8px;box-sizing:border-box;border-radius:2px;}
  .divider{width:280px;text-align:center;font-size:11px;opacity:0.35;margin:2px 0;}
  #log-wrap{position:fixed;bottom:0;left:0;right:0;max-height:30vh;overflow-y:auto;background:rgba(0,0,0,0.92);border-top:1px solid #333;font-size:10px;padding:4px 6px;box-sizing:border-box;z-index:9999;}
  #log-wrap .e{border-bottom:1px solid #1a1a1a;padding:1px 0;word-break:break-all;}
  .err{color:#f66;}.ok{color:#6f6;}.info{color:#adf;}
  #log-btn{position:fixed;bottom:4px;right:4px;z-index:10000;background:#333;color:#fff;border:none;font-size:10px;padding:3px 7px;cursor:pointer;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <h1>PONG</h1>

  <!-- HOME -->
  <div id="s-home" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
    <div class="btn-row">
      <button id="btn-host">HOST</button>
      <button id="btn-join">JOIN</button>
    </div>
  </div>

  <!-- HOST -->
  <div id="s-host" style="display:none;flex-direction:column;align-items:center;gap:12px;">
    <p class="hint" id="host-hint">Generating offer…</p>
    <div class="btn-row" id="host-share-btns" style="display:none;">
      <button id="btn-share">SHARE CODE</button>
      <button class="sec" id="btn-copy">COPY</button>
    </div>
    <div id="st-host" class="status"></div>
    <div id="host-answer-area" style="display:none;flex-direction:column;align-items:center;gap:10px;">
      <p class="hint">Paste the guest's reply code:</p>
      <textarea id="ta-answer" placeholder="Paste guest reply code here…"></textarea>
      <button id="btn-paste-answer">CONNECT</button>
    </div>
  </div>

  <!-- JOIN -->
  <div id="s-join" style="display:none;flex-direction:column;align-items:center;gap:12px;">
    <p class="hint" id="join-hint">Paste the host's code:</p>
    <textarea id="ta-offer" placeholder="Paste host offer code here…"></textarea>
    <button id="btn-submit-offer">CONNECT</button>
    <div id="st-join" class="status"></div>
    <div id="join-answer-area" style="display:none;flex-direction:column;align-items:center;gap:10px;">
      <p class="hint">Send this reply code to the host:</p>
      <textarea id="ta-answer-out" readonly></textarea>
      <div class="btn-row">
        <button id="btn-share-answer">SHARE REPLY</button>
        <button class="sec" id="btn-copy-answer">COPY</button>
      </div>
    </div>
  </div>
</div>

<div id="log-wrap"></div>
<button id="log-btn" onclick="toggleLog()">LOG</button>

<script type="module">
// ── Log ───────────────────────────────────────────────────────────────────────
const logWrap = document.getElementById("log-wrap");
let logVis = true;
window.toggleLog = () => { logVis=!logVis; logWrap.style.display=logVis?"block":"none"; };
function log(m, t="info") {
  console.log(m);
  const d = document.createElement("div");
  d.className = "e "+t;
  d.textContent = new Date().toISOString().substr(11,8)+" "+m;
  logWrap.appendChild(d); logWrap.scrollTop = logWrap.scrollHeight;
}
window.onerror = (m,s,l) => log("ERR:"+m+" "+s+":"+l,"err");
window.onunhandledrejection = e => log("PROMISE:"+(e.reason?.message||e.reason),"err");

// ── SDP pack/unpack ───────────────────────────────────────────────────────────
function extr(sdp, pfx) {
  const l = sdp.split("\n").find(l => l.trimStart().startsWith(pfx));
  return l ? l.trim().slice(pfx.length).trim() : "";
}
function packSDP(sdpObj) {
  const s = sdpObj.sdp;
  const type  = sdpObj.type === "offer" ? "o" : "a";
  const ufrag = extr(s, "a=ice-ufrag:");
  const pwd   = extr(s, "a=ice-pwd:");
  const fp    = extr(s, "a=fingerprint:").replace(/^sha-256 /i, "");
  const setup = extr(s, "a=setup:");
  const cands = s.split("\n")
    .filter(l => l.trimStart().startsWith("a=candidate:"))
    .map(l => l.trim().slice("a=candidate:".length));
  // prefer srflx (STUN-derived, works across NAT), then host
  const cand = cands.find(c => c.includes("srflx")) || cands[0] || "";
  const packed = [type, ufrag, pwd, fp, setup, cand].join("|");
  log("packed="+packed.length+" chars");
  return btoa(packed).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function unpackSDP(enc) {
  const packed = atob(enc.trim().replace(/-/g,"+").replace(/_/g,"/"));
  const [type, ufrag, pwd, fp, setup, cand] = packed.split("|");
  const sdp = [
    "v=0","o=- 1 1 IN IP4 0.0.0.0","s=-","t=0 0","a=group:BUNDLE 0",
    "m=application 9 UDP/DTLS/SCTP webrtc-datachannel","c=IN IP4 0.0.0.0",
    "a=ice-ufrag:"+ufrag, "a=ice-pwd:"+pwd, "a=ice-options:trickle",
    "a=fingerprint:sha-256 "+fp, "a=setup:"+setup, "a=mid:0",
    "a=sctp-port:5000", "a=max-message-size:262144",
    cand ? "a=candidate:"+cand : ""
  ].filter(Boolean).join("\r\n")+"\r\n";
  log("unpacked type="+(type==="o"?"offer":"answer")+" sdpLen="+sdp.length);
  return { type: type==="o" ? "offer" : "answer", sdp };
}

// ── Share / copy (raw code only, no URL) ─────────────────────────────────────
async function shareCode(code, label) {
  const text = code;
  if (navigator.share) {
    try { await navigator.share({ title: "Pong "+label, text }); return; } catch(e) { log("share cancelled/failed: "+e.message); }
  }
  await copyCode(code);
  alert("Copied! Send to the other player.");
}
async function copyCode(code) {
  try { await navigator.clipboard.writeText(code); log("copied","ok"); }
  catch(e) { log("clipboard err: "+e.message,"err"); }
}

// ── Handle URL hash (auto-fill if opened via shared link) ────────────────────
function checkHash() {
  const h = location.hash.slice(1);
  if (!h) return;
  history.replaceState(null,"",location.pathname); // clean the URL
  if (h.startsWith("o")) {
    log("offer detected in URL");
    showScreen("s-join");
    document.getElementById("ta-offer").value = h.slice(1);
    setEl("join-hint","Offer received — tap CONNECT");
  } else if (h.startsWith("a")) {
    log("answer detected in URL");
    showScreen("s-host");
    document.getElementById("host-answer-area").style.display = "flex";
    document.getElementById("ta-answer").value = h.slice(1);
    setEl("host-hint","Reply received — tap CONNECT");
  }
}

// ── WebRTC ────────────────────────────────────────────────────────────────────
const RTC_CFG = { iceServers: [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" },
  { urls: "stun:stun.cloudflare.com:3478" },
  { urls: "stun:stun.stunprotocol.org:3478" },
]};
let pc = null, dc = null, role = null;
// Keep last known payloads so we can re-offer/re-answer after iOS wakes up
let lastOfferPayload = null, lastAnswerPayload = null;

function createPC() {
  log("createPC");
  if (pc) { try { pc.close(); } catch(e){} }
  pc = new RTCPeerConnection(RTC_CFG);
  pc.onicegatheringstatechange = () => log("iceGather: "+pc.iceGatheringState);
  pc.oniceconnectionstatechange = () => {
    const s = pc.iceConnectionState;
    log("iceCon: "+s, s==="connected"||s==="completed" ? "ok" : "info");
    if (s==="connected"||s==="completed") log("CONNECTED!", "ok");
    if ((s==="failed"||s==="disconnected") && gameRunning) {
      log("connection lost — attempting ICE restart","err");
      if (role==="host") hostICERestart();
    }
  };
  return pc;
}

// Wait for ICE — resolves on first srflx, null candidate, or timeout
function waitICE(pc) {
  return new Promise(res => {
    let done = false;
    const finish = (reason) => {
      if (done) return; done = true;
      log("ICE done: "+reason, "ok");
      res();
    };
    pc.onicecandidate = e => {
      if (e.candidate) {
        log("cand: "+e.candidate.type+" "+e.candidate.protocol);
        if (e.candidate.type === "srflx") finish("got srflx");
      } else {
        finish("gathering complete");
      }
    };
    pc.onicegatheringstatechange = () => {
      if (pc.iceGatheringState === "complete") finish("gatheringState=complete");
    };
    setTimeout(() => finish("timeout 12s"), 12000);
  });
}

// ICE restart (host-side): re-offer with iceRestart:true, share new payload
async function hostICERestart() {
  try {
    log("ICE restart…");
    const offer = await pc.createOffer({ iceRestart: true });
    await pc.setLocalDescription(offer);
    await waitICE(pc);
    lastOfferPayload = packSDP(pc.localDescription);
    log("new offer ready after restart, len="+lastOfferPayload.length,"ok");
    // Update the UI so user can re-share
    const offerURL = location.href.split("#")[0] + "#o" + lastOfferPayload;
    setEl("st-host","Connection dropped. Re-share your link:");
    document.getElementById("btn-share").onclick = () => navigator.share ? navigator.share({title:"Join my Pong game", url:offerURL}) : shareCode(offerURL,"Offer");
    document.getElementById("btn-copy").onclick  = async () => { await copyCode(offerURL); alert("Link copied!"); };
    document.getElementById("host-share-btns").style.display = "flex";
    document.getElementById("host-answer-area").style.display = "flex";
  } catch(e) { log("ICE restart err: "+e.message,"err"); }
}

// Restore PC after iOS wakeup — if ICE is dead, restart
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState !== "visible") return;
  log("page visible again");
  if (!pc) return;
  const s = pc.iceConnectionState;
  log("iceConnectionState on wake: "+s);
  if (s === "failed" || s === "disconnected" || s === "closed") {
    log("ICE dead after wake, restarting…","err");
    if (role === "host") hostICERestart();
    else if (role === "guest" && lastAnswerPayload) {
      setEl("st-join","Connection dropped. Host needs to re-share their offer.");
    }
  }
});

// ── HOST ──────────────────────────────────────────────────────────────────────
async function startHost() {
  log("startHost"); role = "host";
  showScreen("s-host");
  setEl("host-hint","Generating offer…");

  pc = createPC();
  dc = pc.createDataChannel("pong");
  setupDC(dc);

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  log("local desc set, waiting for ICE…");
  await waitICE(pc);

  const payload = packSDP(pc.localDescription);
  lastOfferPayload = payload;
  log("offer ready, len="+payload.length);

  const offerURL = location.href.split("#")[0] + "#o" + payload;
  setEl("host-hint","Share this link with the guest:");
  document.getElementById("host-share-btns").style.display = "flex";
  document.getElementById("btn-share").onclick = () => navigator.share ? navigator.share({title:"Join my Pong game", url:offerURL}) : shareCode(offerURL,"Offer");
  document.getElementById("btn-copy").onclick  = async () => { await copyCode(offerURL); alert("Link copied!"); };

  setEl("st-host","Waiting for guest reply…");
  document.getElementById("host-answer-area").style.display = "flex";

  document.getElementById("btn-paste-answer").onclick = () => {
    const v = document.getElementById("ta-answer").value.trim();
    if (v) applyAnswer(v); else alert("Paste the guest code first");
  };
}

async function applyAnswer(raw) {
  log("applyAnswer");
  try {
    // strip URL wrapper if someone accidentally shared a link
    let code = raw;
    if (raw.includes("#")) code = new URL(raw).hash.slice(2);
    const sdpObj = unpackSDP(code);
    await pc.setRemoteDescription(new RTCSessionDescription(sdpObj));
    log("host remoteDesc set","ok");
    setEl("st-host","Connecting…");
  } catch(e) { log("applyAnswer err: "+e.message,"err"); }
}

// ── GUEST ─────────────────────────────────────────────────────────────────────
async function processOffer(raw) {
  log("processOffer");
  setEl("st-join","Processing…");
  try {
    let code = raw;
    if (raw.includes("#")) code = new URL(raw).hash.slice(2);
    const sdpObj = unpackSDP(code);

    pc = createPC();
    pc.ondatachannel = e => { log("ondatachannel","ok"); dc = e.channel; setupDC(dc); };
    await pc.setRemoteDescription(new RTCSessionDescription(sdpObj));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    log("guest local desc set, waiting for ICE…");
    await waitICE(pc);

    const answerPayload = packSDP(pc.localDescription);
    lastAnswerPayload = answerPayload;
    log("answer ready, len="+answerPayload.length);

    setEl("join-hint","Send this reply code to the host:");
    const ta = document.getElementById("ta-answer-out");
    ta.value = answerPayload;
    document.getElementById("join-answer-area").style.display = "flex";
    document.getElementById("btn-share-answer").onclick = () => shareCode(answerPayload, "Reply");
    document.getElementById("btn-copy-answer").onclick  = async () => { await copyCode(answerPayload); alert("Copied!"); };
    setEl("st-join","Waiting for host to connect…");
  } catch(e) { log("processOffer err: "+e.message,"err"); }
}

// ── DataChannel ───────────────────────────────────────────────────────────────
function setupDC(ch) {
  log("setupDC");
  ch.onopen  = () => { log("DC open!","ok"); hideUI(); initState(); myX=W/2; gameRunning=true; };
  ch.onclose = () => log("DC closed","err");
  ch.onerror = e => log("DC err: "+e,"err");
  ch.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type==="state" && role==="guest") {
      const s = msg.state;
      state.guest.x=s.guest.x; state.host.x=s.host.x;
      state.score={host:s.score.guest, guest:s.score.host};
      state.ball.x=s.ball.x; state.ball.y=H-s.ball.y;
      state.paused=s.paused; gameResult="";
      if (s.paused&&s.score.host>=MAX_SCORE)  gameResult="guest";
      if (s.paused&&s.score.guest>=MAX_SCORE) gameResult="host";
      const t={...state.host}; state.host={...state.guest}; state.guest=t;
    } else if (msg.type==="input" && role==="host") {
      state.guest.x=msg.x;
    }
  };
}

// ── Game ──────────────────────────────────────────────────────────────────────
const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener("resize",resize); resize();
const MAX_SCORE=5, PAD={w:120,h:12,margin:30};
let gameRunning=false, gameResult="";
let state={ball:{x:0,y:0},host:{x:0},guest:{x:0},score:{host:0,guest:0},paused:true};
let myX=0, ballSpeed=300, ballVx=0, ballVy=0;
function initState(){state.ball.x=W/2;state.ball.y=H/2;state.host.x=W/2;state.guest.x=W/2;state.score={host:0,guest:0};ballSpeed=300;myX=W/2;serveBall();}
function serveBall(){const a=(Math.random()*Math.PI/3)-Math.PI/6,d=Math.random()>.5?1:-1;ballVx=Math.sin(a);ballVy=Math.cos(a)*d;state.ball.x=W/2;state.ball.y=H/2;state.paused=true;setTimeout(()=>{state.paused=false;},800);}
function hostUpdate(dt){
  if(state.paused)return;
  state.ball.x+=ballVx*ballSpeed*dt; state.ball.y+=ballVy*ballSpeed*dt;
  if(state.ball.x<0||state.ball.x>W)ballVx*=-1;
  if(state.ball.y>H-PAD.margin-PAD.h&&Math.abs(state.ball.x-state.host.x)<PAD.w/2)hitPad(state.host.x,-1);
  if(state.ball.y<PAD.margin+PAD.h&&Math.abs(state.ball.x-state.guest.x)<PAD.w/2)hitPad(state.guest.x,1);
  if(state.ball.y<0){state.score.host++;checkWin();serveBall();}
  if(state.ball.y>H){state.score.guest++;checkWin();serveBall();}
}
function hitPad(px,dir){const o=(state.ball.x-px)/(PAD.w/2);ballSpeed=Math.min(ballSpeed*1.05,900);ballVx=Math.sin(o*Math.PI/3);ballVy=Math.cos(o*Math.PI/3)*dir;if(navigator.vibrate)navigator.vibrate(10);}
function checkWin(){if(state.score.host>=MAX_SCORE||state.score.guest>=MAX_SCORE){state.paused=true;gameResult=state.score.host>=MAX_SCORE?"host":"guest";setTimeout(()=>{gameResult="";initState();},2000);}}
function draw(){
  ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
  if(!gameRunning)return;
  ctx.fillStyle="#fff";ctx.setLineDash([10,10]);ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.strokeStyle="#fff";ctx.stroke();ctx.setLineDash([]);
  ctx.fillRect(state.host.x-PAD.w/2,H-PAD.margin-PAD.h,PAD.w,PAD.h);
  ctx.fillRect(state.guest.x-PAD.w/2,PAD.margin,PAD.w,PAD.h);
  ctx.beginPath();ctx.arc(state.ball.x,state.ball.y,8,0,Math.PI*2);ctx.fill();
  ctx.font="20px monospace";ctx.textAlign="center";
  ctx.fillText(state.score.guest,W/2,40);ctx.fillText(state.score.host,W/2,H-20);
  if(gameResult){const w=(role==="host"&&gameResult==="host")||(role==="guest"&&gameResult==="guest");ctx.font="bold 28px monospace";ctx.fillText(w?"YOU WIN!":"YOU LOSE",W/2,H/2);}
}
let lastTime=0;
function loop(t){const dt=Math.min((t-lastTime)/1000,0.05);lastTime=t;if(gameRunning&&role==="host"){state.host.x=myX;hostUpdate(dt);if(dc&&dc.readyState==="open")dc.send(JSON.stringify({type:"state",state,ballVx,ballVy,ballSpeed}));}draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
canvas.addEventListener("touchstart",e=>moveMe(e.touches[0].clientX));
canvas.addEventListener("touchmove",e=>moveMe(e.touches[0].clientX));
canvas.addEventListener("mousemove",e=>moveMe(e.clientX));
function moveMe(x){if(!gameRunning)return;myX=clamp(x,PAD.w/2,W-PAD.w/2);if(role==="guest"&&dc&&dc.readyState==="open")dc.send(JSON.stringify({type:"input",x:myX}));}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showScreen(id){["s-home","s-host","s-join"].forEach(s=>document.getElementById(s).style.display="none");document.getElementById(id).style.display="flex";}
function hideUI(){document.getElementById("ui").style.display="none";}
function setEl(id,t){const e=document.getElementById(id);if(e)e.textContent=t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

document.getElementById("btn-host").onclick = startHost;
document.getElementById("btn-join").onclick  = () => {
  showScreen("s-join");
  document.getElementById("btn-submit-offer").onclick = () => {
    const v = document.getElementById("ta-offer").value.trim();
    if (v) processOffer(v); else alert("Paste the host code first");
  };
};

checkHash();
log("ready | RTC="+(typeof RTCPeerConnection)+" | share="+(!!navigator.share));
</script>
</body>
</html>
