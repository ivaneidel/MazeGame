<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pong P2P QR</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  overflow:hidden;
  touch-action:none;
}
#ui { padding:15px; }
canvas { display:none; }
video { width:100%; display:none; }

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  background:white;
  color:black;
  border:none;
}

#log {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  max-height:150px;
  overflow:auto;
  background:#000;
  font-size:11px;
  border-top:1px solid #333;
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="host()">Host</button>
  <button onclick="join()">Join</button>
  <button onclick="toggleLog()">Toggle Debug</button>

  <div id="qr"></div>
  <video id="cam" autoplay></video>
</div>

<canvas id="game"></canvas>
<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<script>
// --- LOG ---
const logEl = document.getElementById("log");
function log(msg){
  const t=new Date().toLocaleTimeString();
  logEl.innerHTML += `[${t}] ${msg}<br>`;
  logEl.scrollTop = logEl.scrollHeight;
}
function toggleLog(){
  logEl.style.display = logEl.style.display==="none"?"block":"none";
}

// --- WEBRTC ---
let pc, dc, isHost=false;

function setup(){
  pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.onicecandidate = e=>{
    if(!e.candidate){
      if(isHost){
        showQR(JSON.stringify(pc.localDescription));
      }
    }
  };

  pc.onconnectionstatechange = ()=>{
    log("Conn: "+pc.connectionState);
  };

  pc.oniceconnectionstatechange = ()=>{
    log("ICE: "+pc.iceConnectionState);
  };

  pc.ondatachannel = e=>{
    dc=e.channel;
    setupDC();
  };
}

function setupDC(){
  dc.onopen = ()=>{
    log("🟢 Data open");
    startGame(); // 🔥 FORCE START BOTH SIDES
  };

  dc.onmessage = e=>{
    handle(JSON.parse(e.data));
  };
}

// --- HOST ---
async function host(){
  isHost=true;
  setup();

  dc = pc.createDataChannel("g");
  setupDC();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
}

// --- JOIN ---
async function join(){
  setup();
  startCamera();
}

// --- QR ---
function showQR(data){
  document.getElementById("qr").innerHTML="";
  new QRCode(document.getElementById("qr"), data);
}

// --- CAMERA SCAN ---
async function startCamera(){
  const video=document.getElementById("cam");
  video.style.display="block";

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject=stream;

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  const scan = setInterval(()=>{
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);

    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(img.data,canvas.width,canvas.height);

    if(code){
      clearInterval(scan);
      video.srcObject.getTracks().forEach(t=>t.stop());
      video.style.display="none";
      connect(code.data);
    }
  },300);
}

// --- CONNECT ---
async function connect(data){
  const offer=JSON.parse(data);
  await pc.setRemoteDescription(offer);

  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);

  // send answer back via QR
  showQR(JSON.stringify(pc.localDescription));
}

// --- GAME ---
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let W,H;
let player={x:0};
let opponent={x:0};
let targetX=0;

let ball={x:0,y:0,vx:0,vy:0,speed:300};

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
addEventListener("resize",resize);

function startGame(){
  document.getElementById("ui").style.display="none";
  canvas.style.display="block";

  resize();
  player.x=W/2;
  opponent.x=W/2;

  if(isHost) resetBall();

  requestAnimationFrame(loop);
}

// --- INPUT ---
canvas.addEventListener("touchmove",e=>{
  const x=e.touches[0].clientX;
  player.x=x;
  send({t:"p",x});
});

// --- NETWORK ---
function send(d){
  if(dc?.readyState==="open"){
    dc.send(JSON.stringify(d));
  }
}

function handle(d){
  if(d.t==="p") targetX=d.x;
  if(d.t==="b") ball=d.ball;
}

// --- GAME ---
function resetBall(){
  ball.x=W/2;
  ball.y=H/2;

  const a=(Math.random()*Math.PI/3)-(Math.PI/6);
  const dir=Math.random()>0.5?1:-1;

  ball.vx=Math.sin(a);
  ball.vy=Math.cos(a)*dir;
}

function update(dt){
  opponent.x += (targetX - opponent.x)*10*dt;

  if(!isHost) return;

  ball.x+=ball.vx*ball.speed*dt;
  ball.y+=ball.vy*ball.speed*dt;

  if(ball.x<0||ball.x>W) ball.vx*=-1;

  if(ball.y>H-40 && Math.abs(ball.x-player.x)<60){
    ball.vy*=-1;
  }

  if(ball.y<40 && Math.abs(ball.x-opponent.x)<60){
    ball.vy*=-1;
  }

  send({t:"b",ball});
}

// --- DRAW ---
function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="white";

  ctx.fillRect(player.x-60,H-30,120,10);
  ctx.fillRect(opponent.x-60,20,120,10);

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  ctx.fill();
}

// --- LOOP ---
let last=0;
function loop(t){
  const dt=(t-last)/1000;
  last=t;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
