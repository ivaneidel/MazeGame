<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Optical Link PRO</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  text-align:center;
}
#ui { padding:10px; }

#flash {
  width:100vw;
  height:30vh;
  display:none;
}

canvas { width:100%; }

#bits, #log {
  font-size:10px;
  max-height:140px;
  overflow:auto;
  background:#111;
  padding:5px;
  margin-top:5px;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="startSender()">Sender</button>
  <button onclick="startReceiver()">Receiver</button>
  <div id="progress"></div>
</div>

<div id="flash"></div>
<video id="cam" autoplay playsinline style="display:none"></video>
<canvas id="view"></canvas>

<div id="bits"></div>
<div id="log"></div>

<script>
// ===== CONFIG =====
const GRID = 6;
const FRAME_BITS = GRID * GRID;
const PREAMBLE = "10101010101010101010101010101010";

// calibration
let RED_REF = [255,0,0];
let BLUE_REF = [0,0,255];

// ===== LOG =====
const logEl = document.getElementById("log");
function log(m){
  logEl.innerHTML += m+"<br>";
  logEl.scrollTop = logEl.scrollHeight;
}

// ===== UTILS =====
function strToBits(str){
  return str.split("").map(c =>
    c.charCodeAt(0).toString(2).padStart(8,"0")
  ).join("");
}
function bitsToStr(bits){
  let out="";
  for(let i=0;i<bits.length;i+=8){
    out+=String.fromCharCode(parseInt(bits.slice(i,i+8),2));
  }
  return out;
}

function buildPayload(str){
  const data = strToBits(str);
  const len = data.length.toString(2).padStart(32,"0");
  return PREAMBLE + len + data;
}

// ===== DISTANCE =====
function dist(a,b){
  return Math.sqrt(
    (a[0]-b[0])**2 +
    (a[1]-b[1])**2 +
    (a[2]-b[2])**2
  );
}

// ===== SENDER =====
async function startSender(){
  const msg = prompt("Message", "HELLO");
  if(!msg) return;

  log("⏳ 3s...");
  await sleep(3000);

  const flash = document.getElementById("flash");
  flash.style.display="grid";
  flash.style.gridTemplateColumns = `repeat(${GRID},1fr)`;

  // --- CALIBRATION ---
  log("🔴 Calibrating RED");
  await fillColor("rgb(255,0,0)", 1000);

  log("🔵 Calibrating BLUE");
  await fillColor("rgb(0,0,255)", 1000);

  const bits = buildPayload(msg);

  let i=0;

  while(i<bits.length){

    // --- DATA FRAME ---
    const chunk = bits.slice(i,i+FRAME_BITS).padEnd(FRAME_BITS,"0");

    flash.innerHTML="";
    for(let b of chunk){
      const d=document.createElement("div");
      d.style.background = b==="1" ? "rgb(255,0,0)" : "rgb(0,0,255)";
      flash.appendChild(d);
    }

    await sleep(30);

    // --- SYNC FRAME ---
    flash.innerHTML="";
    flash.style.background="white";
    await sleep(20);
    flash.style.background="black";

    i+=FRAME_BITS;
    document.getElementById("progress").innerText =
      `Sending ${Math.floor(i/bits.length*100)}%`;
  }

  flash.style.display="none";
  log("📤 Done");
}

async function fillColor(color, ms){
  const flash = document.getElementById("flash");
  flash.innerHTML="";
  flash.style.background=color;
  await sleep(ms);
}

// ===== RECEIVER =====
async function startReceiver(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  const video = document.getElementById("cam");
  video.srcObject = stream;

  const canvas = document.getElementById("view");
  const ctx = canvas.getContext("2d");

  const bitsEl = document.getElementById("bits");

  let buffer="";
  let synced=false;
  let expectedLen=null;

  let calibrating = 0;

  function loop(){
    if(video.videoWidth===0){
      requestAnimationFrame(loop);
      return;
    }

    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;

    ctx.drawImage(video,0,0);

    const cellW = canvas.width/GRID;
    const cellH = canvas.height/GRID;

    let chunk="";
    let debug="";

    for(let y=0;y<GRID;y++){
      for(let x=0;x<GRID;x++){

        const cx = Math.floor((x+0.5)*cellW);
        const cy = Math.floor((y+0.5)*cellH);

        const px = ctx.getImageData(cx,cy,1,1).data;
        const color = [px[0],px[1],px[2]];

        // --- CALIBRATION ---
        if(calibrating===1) RED_REF = color;
        if(calibrating===2) BLUE_REF = color;

        const dRed = dist(color, RED_REF);
        const dBlue = dist(color, BLUE_REF);

        let bit = dRed < dBlue ? "1" : "0";

        const confidence = Math.abs(dRed - dBlue);

        if(confidence < 30){
          bit = "?";
        }

        chunk += bit==="?" ? "0" : bit;

        debug += `R:${Math.floor(dRed)} B:${Math.floor(dBlue)} -> ${bit}\n`;

        ctx.strokeStyle="white";
        ctx.strokeRect(x*cellW,y*cellH,cellW,cellH);

        ctx.fillStyle="white";
        ctx.fillText(bit,cx-4,cy+4);
      }
    }

    // calibration steps
    if(calibrating===0){
      log("🔴 Capture RED");
      calibrating=1;
      setTimeout(()=>calibrating=2,1000);
      setTimeout(()=>{
        log("🔵 Capture BLUE");
        calibrating=2;
      },1000);
      setTimeout(()=>{
        log("✅ Calibrated");
        calibrating=3;
      },2000);
    }

    if(calibrating===3){

      // sync detection (white flash)
      const avgLum = getAvgLum(ctx,canvas);

      if(avgLum > 200){
        synced=true;
        return requestAnimationFrame(loop);
      }

      if(synced){
        buffer += chunk;

        if(!expectedLen && buffer.length>=32){
          expectedLen = parseInt(buffer.slice(0,32),2);
          buffer = buffer.slice(32);
          log("📏 "+expectedLen);
        }

        if(expectedLen && buffer.length>=expectedLen){
          const msg = bitsToStr(buffer.slice(0,expectedLen));
          log("📥 "+msg);

          stream.getTracks().forEach(t=>t.stop());
          return;
        }
      }
    }

    bitsEl.innerText =
      "FRAME:\n"+chunk+"\n\nDEBUG:\n"+debug.slice(0,500);

    requestAnimationFrame(loop);
  }

  loop();
}

function getAvgLum(ctx,canvas){
  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let sum=0;
  for(let i=0;i<img.data.length;i+=4){
    sum += (img.data[i]+img.data[i+1]+img.data[i+2])/3;
  }
  return sum / (img.data.length/4);
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
</script>

</body>
</html>
