<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sound Link Robust</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  text-align:center;
}
#ui { padding:15px; }

#log, #bits {
  font-size:11px;
  max-height:160px;
  overflow:auto;
  background:#111;
  padding:10px;
  margin-top:10px;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="startSender()">Sender</button>
  <button onclick="startReceiver()">Receiver</button>
</div>

<div id="bits">Idle</div>
<div id="log"></div>

<script>
// ===== CONFIG =====
const SYMBOL_TIME = 60;

const FREQS = {
  "00": 900,
  "01": 1300,
  "10": 1700,
  "11": 2100
};

const START_FREQ = 2600;
const END_FREQ = 3000;

// ===== LOG =====
const logEl = document.getElementById("log");
function log(m){
  logEl.innerHTML += m + "<br>";
  logEl.scrollTop = logEl.scrollHeight;
}

// ===== UTILS =====
function strToBits(str){
  return str.split("").map(c =>
    c.charCodeAt(0).toString(2).padStart(8,"0")
  ).join("");
}

function bitsToStr(bits){
  let out="";
  for(let i=0;i<bits.length;i+=8){
    out+=String.fromCharCode(parseInt(bits.slice(i,i+8),2));
  }
  return out;
}

// ===== SENDER =====
async function startSender(){
  const msg = prompt("Message", "HELLO");
  if(!msg) return;

  log("⏳ 2s...");
  await sleep(2000);

  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  osc.type="sine";
  osc.connect(ctx.destination);
  osc.start();

  // START
  osc.frequency.value = START_FREQ;
  await sleep(500);

  const bits = strToBits(msg);

  for(let i=0;i<bits.length;i+=2){
    const chunk = bits.slice(i,i+2).padEnd(2,"0");
    osc.frequency.value = FREQS[chunk];
    await sleep(SYMBOL_TIME);
  }

  // END
  osc.frequency.value = END_FREQ;
  await sleep(500);

  osc.stop();
  log("📤 Done");
}

// ===== RECEIVER =====
async function startReceiver(){
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});

  const ctx = new AudioContext();
  const src = ctx.createMediaStreamSource(stream);

  const analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;
  src.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  let receiving = false;
  let bits = "";

  log("🎧 Listening...");

  function getFreq(){
    analyser.getByteFrequencyData(data);
    let max=0,iMax=0;

    for(let i=0;i<data.length;i++){
      if(data[i]>max){
        max=data[i];
        iMax=i;
      }
    }

    return iMax * ctx.sampleRate / (data.length*2);
  }

  async function readSymbol(){
    let samples = [];

    for(let i=0;i<5;i++){
      samples.push(getFreq());
      await sleep(10);
    }

    // average
    const avg = samples.reduce((a,b)=>a+b,0)/samples.length;

    return avg;
  }

  async function loop(){
    while(true){

      const freq = await readSymbol();

      // START
      if(!receiving && Math.abs(freq - START_FREQ) < 200){
        log("🚀 START");
        receiving = true;
        bits = "";
        continue;
      }

      // END
      if(receiving && Math.abs(freq - END_FREQ) < 200){
        log("🏁 END");

        const msg = bitsToStr(bits);
        log("📥 " + msg);

        stream.getTracks().forEach(t=>t.stop());
        return;
      }

      if(!receiving) continue;

      // decode symbol
      let best=null, minDiff=9999;

      for(let k in FREQS){
        const diff = Math.abs(freq - FREQS[k]);
        if(diff < minDiff){
          minDiff = diff;
          best = k;
        }
      }

      if(best){
        bits += best;
      }

      document.getElementById("bits").innerText =
`Freq: ${Math.floor(freq)} Hz

Bits:
${bits.slice(-200)}

Decoded:
${bitsToStr(bits)}`;
    }
  }

  loop();
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}
</script>

</body>
</html>
