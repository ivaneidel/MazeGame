<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Vertical Pong V2</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: black;
    overflow: hidden;
    touch-action: none;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// --- GAME STATE ---
let started = false;
let paused = false;

const MAX_SCORE = 5;

let score = { player: 0, ai: 0 };

const paddle = {
  width: 120,
  height: 12,
  margin: 30
};

let player = { x: W / 2 };
let ai = { x: W / 2 };

let ball = {
  x: W / 2,
  y: H / 2,
  vx: 0,
  vy: 0,
  speed: 300 // pixels per second
};

// --- INPUT ---
canvas.addEventListener("touchstart", (e) => {
  if (!started) startGame();
  movePlayer(e.touches[0].clientX);
});

canvas.addEventListener("touchmove", (e) => {
  movePlayer(e.touches[0].clientX);
});

function movePlayer(x) {
  player.x = clamp(x, paddle.width / 2, W - paddle.width / 2);
}

// --- GAME START ---
function startGame() {
  started = true;
  resetBall();
}

function resetBall() {
  paused = true;

  ball.x = W / 2;
  ball.y = H / 2;
  ball.speed = 300;

  const angle = (Math.random() * Math.PI / 3) - Math.PI / 6;
  const dir = Math.random() > 0.5 ? 1 : -1;

  ball.vx = Math.sin(angle);
  ball.vy = Math.cos(angle) * dir;

  // small delay before serve
  setTimeout(() => paused = false, 800);
}

// --- AI ---
function updateAI(dt) {
  const target = ball.x;
  const diff = target - ai.x;

  ai.x += diff * 5 * dt; // time-based

  ai.x = clamp(ai.x, paddle.width / 2, W - paddle.width / 2);
}

// --- UPDATE ---
function update(dt) {
  if (!started || paused) return;

  ball.x += ball.vx * ball.speed * dt;
  ball.y += ball.vy * ball.speed * dt;

  // Wall collision
  if (ball.x < 0 || ball.x > W) {
    ball.vx *= -1;
  }

  // Player paddle
  if (ball.y > H - paddle.margin - paddle.height) {
    if (Math.abs(ball.x - player.x) < paddle.width / 2) {
      hitPaddle(player.x, -1);
    }
  }

  // AI paddle
  if (ball.y < paddle.margin + paddle.height) {
    if (Math.abs(ball.x - ai.x) < paddle.width / 2) {
      hitPaddle(ai.x, 1);
    }
  }

  // Scoring
  if (ball.y < 0) {
    score.player++;
    checkWin();
    resetBall();
  }

  if (ball.y > H) {
    score.ai++;
    checkWin();
    resetBall();
  }

  updateAI(dt);
}

// --- HIT ---
function hitPaddle(paddleX, direction) {
  const offset = (ball.x - paddleX) / (paddle.width / 2);
  const angle = offset * Math.PI / 3;

  ball.speed *= 1.05;

  ball.vx = Math.sin(angle);
  ball.vy = Math.cos(angle) * direction;

  // HAPTIC FEEDBACK
  if (navigator.vibrate) {
    navigator.vibrate(10);
  }
}

// --- WIN ---
function checkWin() {
  if (score.player >= MAX_SCORE || score.ai >= MAX_SCORE) {
    paused = true;
    started = false;

    setTimeout(() => {
      score.player = 0;
      score.ai = 0;
    }, 1500);
  }
}

// --- DRAW ---
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = "white";

  // Center line
  ctx.setLineDash([10, 10]);
  ctx.beginPath();
  ctx.moveTo(0, H / 2);
  ctx.lineTo(W, H / 2);
  ctx.strokeStyle = "white";
  ctx.stroke();
  ctx.setLineDash([]);

  // Paddles
  ctx.fillRect(
    player.x - paddle.width / 2,
    H - paddle.margin - paddle.height,
    paddle.width,
    paddle.height
  );

  ctx.fillRect(
    ai.x - paddle.width / 2,
    paddle.margin,
    paddle.width,
    paddle.height
  );

  // Ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 8, 0, Math.PI * 2);
  ctx.fill();

  // Score
  ctx.font = "20px monospace";
  ctx.textAlign = "center";
  ctx.fillText(score.ai, W / 2, 40);
  ctx.fillText(score.player, W / 2, H - 20);

  // Start / win text
  if (!started) {
    ctx.font = "20px monospace";
    ctx.fillText("Tap to Start", W / 2, H / 2);
  }
}

// --- LOOP (time-based) ---
let lastTime = 0;

function loop(time) {
  const dt = (time - lastTime) / 1000; // seconds
  lastTime = time;

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// --- UTILS ---
function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}
</script>

</body>
</html>
